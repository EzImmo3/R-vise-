<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Révisions – Première Générale</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

  <header class="app-header">
    <h1>Révisions – Première Générale</h1>
    <button id="themeToggle" class="icon-btn">🌙</button>
  </header>

  <main class="app-main">
    <h2>Choisis une matière</h2>

    <div class="grid-matieres">
      <button class="matiere-card" data-matiere="maths">Mathématiques (spé)</button>
      <button class="matiere-card" data-matiere="physique">Physique‑Chimie (spé)</button>
      <button class="matiere-card" data-matiere="ses">SES (spé)</button>
      <button class="matiere-card" data-matiere="svt">SVT (spé)</button>
      <button class="matiere-card" data-matiere="histoiregeo">Histoire‑Géo</button>
      <button class="matiere-card" data-matiere="francais">Français</button>
      <button class="matiere-card" data-matiere="culture">Culture générale</button>
      <button class="matiere-card" data-matiere="info">Informatique (NSI / SNT)</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
