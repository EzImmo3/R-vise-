<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light">
  <main class="container fade-in">

    <button id="backToChapters" class="back-btn">← Chapitres</button>

    <div class="quiz-header">
      <div id="matiereBadge" class="matiere-badge">
        <span id="matiereIcon"></span>
        <span id="matiereName"></span>
      </div>

      <div class="progress-wrapper">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <div id="levelInfo" class="level-info">Niveau : Débutant</div>
      <div id="scoreInfo" class="score-info">Score : 0</div>
      <div id="comboInfo" class="combo-info"></div>
    </div>

    <div class="mode-selector">
      <button data-mode="normal" class="mode-btn active">Normal</button>
      <button data-mode="random" class="mode-btn">Aléatoire</button>
      <button data-mode="exam" class="mode-btn">Examen</button>
      <button data-mode="learning" class="mode-btn">Apprentissage</button>
    </div>

    <div id="timer" class="timer hidden">Temps restant : <span id="timerValue">20:00</span></div>

    <h2 id="chapTitre"></h2>
    <p id="questionIndex"></p>

    <div class="flip-card">
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <p id="questionText"></p>
          <div id="choicesContainer"></div>
        </div>

        <div class="flip-card-back">
          <p id="correctionText"></p>
          <button id="nextQuestionBtn" class="next-btn">Question suivante</button>
        </div>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
